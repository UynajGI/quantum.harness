# cryo.toml — Cryochamber project configuration

# Agent command (e.g. "opencode", "claude", "codex")
agent = "opencode"

# Session timeout in seconds (0 = no timeout)
max_session_duration = 0

# Watch inbox for reactive wake.
# Mixed mode: scheduled Monday-09:48 TODO drives the weekly advisor scan,
# AND `cryo send "msg"` from the operator wakes the agent for a reply.
# See plan.md Step 1.6 for the inbox-handling branch.
watch_inbox = true

# Periodic status report (written to messages/outbox/ for sync delivery):
#   report_time = "09:00" (HH:MM local time)
#   report_interval = 24 (hours between reports; 0 = disabled)
# report_time = "09:00"
# report_interval = 24

# Sync polling interval in seconds (for cryo-zulip sync / cryo-gh sync)
# zulip_poll_interval = 5
# gh_poll_interval = 5

# Provider environment injected into the agent process.
# WARNING: If you add API keys below, ensure cryo.toml is in your .gitignore
# to avoid accidentally committing secrets.
#
# [provider]
# name = "opencode"
# env = { OPENCODE_PROVIDER = "anthropic", OPENCODE_MODEL = "claude-sonnet-4-20250514", ANTHROPIC_API_KEY = "sk-ant-..." }
