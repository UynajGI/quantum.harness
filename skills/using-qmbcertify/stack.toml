id = "qmbcertify"
name = "QMBCertify.jl + Mosek"
language = "julia"
canonical_for = ["polyopt-structured", "heisenberg-certification", "structured-npa", "certified-bounds"]
default_profile = "cpu"

[profiles.cpu]
label = "CPU"
default = true
install = "cpu"
smoke = "cpu"

[profiles.cpu.requirements]
allocation = "login-or-compute"
mpi = false

[install.cpu]
command = "make install qmbcertify"
notes = "Adds QMBCertify + Mosek/MosekTools + ITensors to julia-env via Julia Pkg; setup-julia handles the Julia install/mirror first. Mosek needs a free academic license (MOSEKLM_LICENSE_FILE)."

[smoke.cpu]
where = "login"
command = "julia --project=julia-env -e 'using QMBCertify'"

[docs]
repo = "https://github.com/wangjie212/QMBCertify"
license = "CeCILL-2.1 (file LICENSE.en; GitHub sidebar shows NOASSERTION)"
examples = "https://github.com/wangjie212/QMBCertify/tree/main/examples"
solver = "https://www.mosek.com/ (free academic license required)"
method_skill = "method-polyopt — owns algebra / objective / relaxation strategy"
